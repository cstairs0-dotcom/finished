<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Game Engine Playground</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
}

header {
  padding: 12px;
  background: #020617;
  text-align: center;
  font-size: 20px;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.panel {
  background: #020617;
  padding: 10px;
  border-radius: 8px;
}

textarea {
  width: 100%;
  height: 200px;
  background: black;
  color: #4ade80;
  font-family: monospace;
  border-radius: 6px;
  padding: 10px;
}

button {
  margin-top: 6px;
  padding: 8px 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

canvas {
  background: white;
  border-radius: 6px;
}
</style>
</head>

<body>

<header>🎮 Mini JavaScript Game Engine</header>

<div class="container">

<!-- CODE -->
<div class="panel">
<textarea id="code">
function update() {
  if (keys["ArrowRight"] || keys["d"]) player.x += 3;
  if (keys["ArrowLeft"] || keys["a"]) player.x -= 3;
  if (keys["ArrowDown"] || keys["s"]) player.y += 3;
  if (keys["ArrowUp"] || keys["w"]) player.y -= 3;
}

function draw() {
  clearCanvas();
  drawSquare(player.x, player.y, player.size);

  if (mouse.down) {
    drawCircle(mouse.x, mouse.y, 10);
  }
}
</textarea>
<button onclick="startGame()">▶ Run Game</button>
</div>

<!-- CANVAS -->
<div class="panel">
<canvas id="canvas" width="400" height="400"></canvas>
</div>

</div>

<script>
// ===== ENGINE CORE =====
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let keys = {};
let mouse = { x: 0, y: 0, down: false };
let running = false;

// Player object
let player = { x: 180, y: 180, size: 30 };

// ===== INPUT =====
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
canvas.addEventListener("mousedown", () => mouse.down = true);
canvas.addEventListener("mouseup", () => mouse.down = false);

// ===== DRAWING API =====
function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawSquare(x, y, size) {
  ctx.fillStyle = "black";
  ctx.fillRect(x, y, size, size);
}

function drawCircle(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawLine(x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function drawArc(x, y, r, s, e) {
  ctx.beginPath();
  ctx.arc(x, y, r, s, e);
  ctx.stroke();
}

// ===== GAME LOOP =====
let update = () => {};
let draw = () => {};

function gameLoop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== RUNNER =====
function startGame() {
  running = false;
  const userCode = document.getElementById("code").value;

  try {
    eval(userCode);
    running = true;
    gameLoop();
  } catch (e) {
    alert("Error: " + e.message);
  }
}
</script>

</body>
</html>
